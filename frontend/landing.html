<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hometown Hub</title>
  <link rel="icon" type="image/png" href="assets/favicon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07071a;
      --purple: #6c5ce7;
      --btn-start: #5b3ff8;
      --btn-end: #7b2ff7;
      --text: #ffffff;
      --muted: #7a7aaa;
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      overflow: hidden;
    }
    .blob { position: fixed; border-radius: 50%; filter: blur(110px); opacity: 0.15; pointer-events: none; }
    .blob-1 { width: 400px; height: 400px; background: #7b2ff7; top: -100px; left: -80px; }
    .blob-2 { width: 300px; height: 300px; background: #6c5ce7; bottom: -60px; right: -60px; }
    .card {
      width: min(420px, 94vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 32px 36px;
      animation: fadeUp .6s cubic-bezier(.22,.68,0,1.15) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo-icon { width: 68px; height: 68px; margin-bottom: 6px; }
    .logo-icon svg { width: 100%; height: 100%; }
    .brand-name { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
    .tagline { font-size: 1rem; font-weight: 300; color: var(--muted); margin-bottom: 28px; text-align: center; }
    .illustration {
      width: 100%;
      max-width: 380px;
      margin-bottom: 32px;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
    }
    .illustration img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 20px;
    }
    /* fade bottom edge into bg */
    .illustration::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--bg));
      border-radius: 0 0 20px 20px;
      pointer-events: none;
    }
    .btn-wrap { width: 100%; display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
    .btn {
      width: 100%;
      padding: 17px;
      border-radius: 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      position: relative;
      overflow: hidden;
      transition: transform .15s, box-shadow .25s;
    }
    .btn-primary {
      background: linear-gradient(90deg, var(--btn-start), var(--btn-end));
      color: #fff;
      box-shadow: 0 4px 30px rgba(108,92,231,0.5);
    }
    .btn-primary::after {
      content: '';
      position: absolute;
      bottom: 0; left: 10%; right: 10%;
      height: 6px;
      background: radial-gradient(ellipse at center, rgba(200,170,255,0.7), transparent 70%);
      border-radius: 50%;
      filter: blur(4px);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 36px rgba(108,92,231,0.65); }
    .btn-secondary {
      background: rgba(255,255,255,0.04);
      color: #fff;
      border: 1.5px solid rgba(108,92,231,0.35);
      box-shadow: 0 2px 20px rgba(108,92,231,0.15);
    }
    .btn-secondary::after {
      content: '';
      position: absolute;
      bottom: 0; left: 15%; right: 15%;
      height: 4px;
      background: radial-gradient(ellipse at center, rgba(140,110,255,0.5), transparent 70%);
      border-radius: 50%;
      filter: blur(3px);
    }
    .btn-secondary:hover { transform: translateY(-1px); border-color: rgba(130,100,255,0.7); }
    .btn:active { transform: translateY(0); }
    .footer-text { font-size: 0.85rem; color: var(--muted); text-align: center; }
    
    @media(max-width:480px){
      img{
        width: 100%;
        max-width: 400px;
      }
    }
    @media(max-width:360px) {
      img{
        width: 100%;
        max-width: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="card">
    <div class="logo-icon">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#00e5c8"/>
            <stop offset="100%" stop-color="#7b2ff7"/>
          </linearGradient>
        </defs>
        <circle cx="32" cy="20" r="14" fill="url(#lg)"/>
        <circle cx="32" cy="20" r="6" fill="#07071a"/>
        <path d="M10 38 L32 20 L54 38 H44 V54 H20 V38 Z" fill="white"/>
        <rect x="26" y="42" width="12" height="12" rx="1" fill="#07071a"/>
      </svg>
    </div>
    <h1 class="brand-name">Hometown Hub</h1>
    <div>
      <img src="assets/bg.png"/>
    </div>
    <div class="btn-wrap">
      <button class="btn btn-primary" id="join-btn">Join Community</button>
      <button class="btn btn-secondary" id="login-btn">Log In</button>
    </div>
    <p class="footer-text">Discover people from your hometown</p>
  </div>
  <script>
    document.getElementById('join-btn').addEventListener('click',()=>{
      localStorage.setItem("showSide",'register');
      window.location.href='login-register.html';
    });
    document.getElementById("login-btn").addEventListener('click',()=>{
      localStorage.setItem("showSide",'login');
      window.location.href='login-register.html';
    });
  </script>
</body>
</html>
