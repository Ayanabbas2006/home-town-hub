<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hometown Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #07071a;
      font-family: 'Outfit', sans-serif;
      color: #fff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: top;
    }

    body::before {
      content: ''; position: fixed;
      width: 460px; height: 460px; border-radius: 50%;
      background: radial-gradient(circle, #7b2ff7, transparent 70%);
      filter: blur(110px); opacity: .16;
      top: -100px; left: -100px; pointer-events: none;
    }
    body::after {
      content: ''; position: fixed;
      width: 340px; height: 340px; border-radius: 50%;
      background: radial-gradient(circle, #6c5ce7, transparent 70%);
      filter: blur(110px); opacity: .16;
      bottom: -80px; right: -80px; pointer-events: none;
    }

    /* ── LOGO outside card ── */
    .logo-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 24px;
      animation: fadeUp .5s cubic-bezier(.22,.68,0,1.2) both;
      z-index: 1;
    }
    .logo-header svg { width: 68px; height: 68px; }
    .logo-name { font-size: 2rem; font-weight: 800; letter-spacing: -.5px; }

    /* ── FLIP STRUCTURE ── */
    .scene {
      perspective: 1200px;
      width: min(440px, 92vw);
      height: 500px;
      animation: fadeUp .55s cubic-bezier(.22,.68,0,1.2) .08s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      position: relative;
      width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.75s cubic-bezier(.4,0,.2,1);
    }
    .card.flipped { transform: rotateY(180deg); }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 24px;
      background: #0b0b28;
      border: 1px solid rgba(108,80,220,0.22);
      box-shadow: 0 0 70px rgba(108,92,231,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 36px 32px;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .face::-webkit-scrollbar { display: none; }
    .face.back { transform: rotateY(180deg); }

    .page-label {
      font-size: 1.05rem; font-weight: 400; color: #9a9ac0;
      margin-bottom: 22px; align-self: flex-start;
    }

    /* ── INPUTS ── */
    .field {
      position: relative;
      width: 100%;
      margin-bottom: 13px;
    }
    .field label {
      position: absolute;
      top: 12px; left: 50px;
      font-size: 0.76rem; font-weight: 600; color: #fff;
      pointer-events: none;
    }
    .field .fi {
      position: absolute; left: 15px; top: 50%;
      transform: translateY(-50%);
      color: #6c5ce7; display: flex; align-items: center;
    }
    .field .fr {
      position: absolute; right: 15px; top: 50%;
      transform: translateY(-50%);
      color: #7a7aaa; cursor: pointer; display: flex; align-items: center;
      transition: color .2s;
    }
    .field .fr:hover { color: #a29bfe; }

    .field input {
      width: 100%;
      padding: 25px 46px 10px 50px;
      background: rgba(255,255,255,0.025);
      border: 1.5px solid rgba(90,70,220,0.45);
      border-radius: 13px;
      color: #8888b0;
      font-family: 'Outfit', sans-serif;
      font-size: 0.93rem; font-weight: 300;
      outline: none;
      transition: border-color .25s, box-shadow .25s, color .2s;
    }
    .field input:focus {
      border-color: rgba(140,100,255,0.9);
      box-shadow: 0 0 0 3px rgba(108,92,231,0.18);
      color: #fff;
    }
    .field input::placeholder { color: #6a6a90; font-weight: 300; }

    .forgot {
      width: 100%; text-align: right;
      font-size: 0.82rem; color: #7a7aaa;
      text-decoration: none; margin-bottom: 18px;
      transition: color .2s; display: block;
    }
    .forgot:hover { color: #a29bfe; }

    /* ── BUTTON ── */
    .btn{
      padding: 10px;
    }
    .btn-main {
      width: 100%; padding: 16px; border: none; border-radius: 13px;
      background: linear-gradient(90deg, #5b3ff8, #7b2ff7);
      color: #fff; font-family: 'Outfit', sans-serif;
      font-size: 1.05rem; font-weight: 700;
      cursor: pointer; position: relative; overflow: hidden;
      box-shadow: 0 4px 28px rgba(108,92,231,0.5);
      transition: transform .15s, box-shadow .25s;
      letter-spacing: .3px;
    }
    .btn-main::after {
      content: ''; position: absolute;
      bottom: 0; left: 10%; right: 10%; height: 5px;
      background: radial-gradient(ellipse at center, rgba(200,170,255,0.6), transparent 70%);
      filter: blur(3px);
    }
    .btn-main:hover  { transform: translateY(-1px); box-shadow: 0 8px 34px rgba(108,92,231,0.65); }
    .btn-main:active { transform: translateY(0); }

    .switch {
      text-align: center; margin-top: 16px;
      font-size: 0.88rem; color: #7a7aaa;
    }
    .switch button {
      background: none; border: none; cursor: pointer;
      color: #a29bfe; font-family: 'Outfit', sans-serif;
      font-size: 0.88rem; font-weight: 600; margin-left: 4px;
      transition: color .2s;
    }
    .switch button:hover { color: #fff; }

    /* ── AVATAR ── */
    .avatar-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 13px;
    }
    .avatar-row .name-field { flex: 1; margin-bottom: 0; }

    .avatar-wrap {
      position: relative;
      width: 82px; height: 82px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .avatar-box {
      width: 82px; height: 82px;
      border-radius: 14px;
      border: 1.5px solid rgba(140,80,255,0.6);
      background: rgba(90,50,180,0.15);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      box-shadow: 0 0 18px rgba(108,92,231,0.2);
      transition: border-color .2s, box-shadow .2s;
    }
    .avatar-box:hover {
      border-color: rgba(180,120,255,0.9);
      box-shadow: 0 0 26px rgba(108,92,231,0.45);
    }
    .avatar-box img {
      width: 100%; height: 100%; object-fit: cover; display: none; border-radius: 12px;
    }
    .avatar-plus {
      position: absolute; top: -7px; right: -7px;
      width: 20px; height: 20px; border-radius: 6px;
      background: #1a1050;
      border: 1.5px solid rgba(140,80,255,0.7);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #a29bfe; line-height: 1;
    }
    #avatarInput { display: none; }
  </style>
</head>
<body>

  <!-- logo above card, never flips -->
  <div class="logo-header">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="gL" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#00e5c8"/>
          <stop offset="100%" stop-color="#7b2ff7"/>
        </linearGradient>
      </defs>
      <circle cx="32" cy="20" r="14" fill="url(#gL)"/>
      <circle cx="32" cy="20" r="6"  fill="#07071a"/>
      <path d="M10 38L32 20L54 38H44V54H20V38Z" fill="white"/>
      <rect x="26" y="42" width="12" height="12" rx="1" fill="#07071a"/>
    </svg>
    <span class="logo-name">Hometown Hub</span>
  </div>

  <div class="scene">
    <div class="card" id="card">

      <!-- FRONT: Login -->
      <form>
      <div class="face front">
        <p class="page-label">Login</p>
        <div class="field">
          <span class="fi">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/>
            </svg>
          </span>
          <label for="l-email">Email</label>
          <input id="l-email" type="email" placeholder="Enter your email" autocomplete="email" required/>
        </div>

        <div class="field">
          <span class="fi">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <label for="l-pwd">Password</label>
          <input id="l-pwd" type="password" placeholder="Enter your password" required />
          <span class="fr" id="lEyeBtn">
            <svg id="lEyeOff" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
            <svg id="lEyeOn" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </span>
        </div>

        <a href="#" class="forgot">Forgot password?</a>
        <button class="btn-main">Log In</button>
        <p class="switch btn">Don't have an account? <button type="button" id="toRegister">Register</button></p>
        </form>
      </div>

      <!-- BACK: Register -->
      <div class="face back">
        <form>
        <p class="page-label">Register</p>

        <div class="avatar-row">
          <div class="field name-field">
            <span class="fi">
              <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <label for="r-name">Full Name</label>
            <input id="r-name" type="text" placeholder="Full Name" required/>
          </div>

          <div class="avatar-wrap" onclick="document.getElementById('avatarInput').click()">
            <div class="avatar-box" id="avatarBox">
              <svg width="44" height="44" viewBox="0 0 64 64" fill="none">
                <defs>
                  <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#9060ee"/>
                    <stop offset="100%" stop-color="#5030c8"/>
                  </linearGradient>
                </defs>
                <circle cx="32" cy="22" r="12" fill="url(#ag)" opacity=".75"/>
                <path d="M10 56C10 42 54 42 54 56" fill="url(#ag)" opacity=".75"/>
              </svg>
              <img id="avatarPreview" src="" alt="avatar"/>
            </div>
            <div class="avatar-plus">+</div>
          </div>
          <input type="file" id="avatarInput" accept="image/*" required/>
        </div>

        <div class="field">
          <span class="fi">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/>
            </svg>
          </span>
          <label for="r-email">Email</label>
          <input id="r-email" type="email" placeholder="Email" required/>
        </div>

        <div class="field">
          <span class="fi">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </span>
          <label for="r-town">Hometown</label>
          <input id="r-town" type="text" placeholder="Hometown" required/>
        </div>

        <div class="field">
          <span class="fi">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <label for="r-pwd">Password</label>
          <input id="r-pwd" type="password" placeholder="Password" required/>
          <span class="fr" id="rEyeBtn">
            <svg id="rEyeOff" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
            <svg id="rEyeOn" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </span>
        </div>

        <button class="btn-main btn" style="margin-top:4px">Register</button>
        <p class="switch">Already have an account? <button type="button" id="toLogin">Log In</button></p>
        </form>
      </div>
    </div>
  </div>

  <script>
    const card = document.getElementById('card');
    document.getElementById('toRegister').addEventListener('click', () => card.classList.add('flipped'));
    document.getElementById('toLogin').addEventListener('click',    () => card.classList.remove('flipped'));

    document.getElementById('lEyeBtn').addEventListener('click', () => {
      const p = document.getElementById('l-pwd');
      const show = p.type === 'password';
      p.type = show ? 'text' : 'password';
      document.getElementById('lEyeOff').style.display = show ? 'none' : '';
      document.getElementById('lEyeOn').style.display  = show ? ''     : 'none';
    });

    document.getElementById('rEyeBtn').addEventListener('click', () => {
      const p = document.getElementById('r-pwd');
      const show = p.type === 'password';
      p.type = show ? 'text' : 'password';
      document.getElementById('rEyeOff').style.display = show ? 'none' : '';
      document.getElementById('rEyeOn').style.display  = show ? ''     : 'none';
    });

    document.getElementById('avatarInput').addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const preview = document.getElementById('avatarPreview');
        preview.src = e.target.result;
        preview.style.display = 'block';
        document.getElementById('avatarBox').querySelector('svg').style.display = 'none';
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
